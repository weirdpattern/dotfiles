---
- name: "Install eza on MacOSX"
  community.general.homebrew:
    name: eza
    state: present

- name: "Ensure .config dir exists in ~/"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config"
    state: directory
    mode: "0755"

- name: "Ensure eza dir exists in ~/.config"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/eza"
    state: directory
    mode: "0755"

- name: "Deploy eza themes"
  ansible.builtin.copy:
    src: theme.yml
    dest: "{{ ansible_user_dir }}/.config/eza/theme.yml"
    mode: "0644"

- name: "Ensure zsh dir exists in ~/.config"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/zsh"
    state: directory
    mode: "0755"

- name: "Ensure aliases dir exists in ~/.config/zsh"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/zsh/aliases"
    state: directory
    mode: "0755"

- name: "Deploy eza aliases script"
  ansible.builtin.copy:
    src: aliases.zsh
    dest: "{{ ansible_user_dir }}/.config/zsh/aliases/eza.zsh"
    mode: "0644"

- name: "Ensure exports dir exists in ~/.config/zsh"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/zsh/exports"
    state: directory
    mode: "0755"

- name: "Deploy eza exports script"
  ansible.builtin.copy:
    src: exports.zsh
    dest: "{{ ansible_user_dir }}/.config/zsh/exports/eza.zsh"
    mode: "0644"
