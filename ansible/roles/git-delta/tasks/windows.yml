---
- name: "Install git delta on Windows"
  ansible.builtin.include_role:
    name: winget
  vars:
    winget_package: "{{ item }}"
  loop:
    - "jftuga.less"
    - "dandavison.delta"

- name: "Deploy git delta .config files"
  ansible.windows.win_copy:
    src: "{{ ansible_user_dir }}/.dotfiles/config/.config/git-delta"
    dest: "{{ ansible_user_dir }}/.config/git-delta"
