---
- name: "Install git delta on MacOSX"
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop:
    - less
    - git-delta

- name: "Ensure .config dir exists in ~/"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config"
    state: directory
    mode: "0755"

- name: "Ensure delta dir exists in ~/.config"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/delta"
    state: directory
    mode: "0755"

- name: "Deploy delta themes"
  ansible.builtin.copy:
    src: themes
    dest: "{{ ansible_user_dir }}/.config/delta/themes"
    mode: "0644"
