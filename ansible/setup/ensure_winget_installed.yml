---
- name: Confirm Winget Package Manager is installed
  ansible.windows.win_package:
    name: winget
    state: present
  register: winget_installed
  failed_when: winget_installed is not defined
  ignore_errors: true

- name: Install Winget Package Manager
  ansible.builtin.shell: |
    $installed = Get-AppPackage -name "Microsoft.DesktopAppInstaller"
    if (-Not($installed)) {
      $releases_url = "https://api.github.com/repos/microsoft/winget-cli/releases/latest"
      $releases = Invoke-RestMethod -uri "$($releases_url)"
      $latestRelease = $releases.assets | Where { $_.browser_download_url.EndsWith("msixbundle") } | Select -First 1
      Add-AppxPackage -Path $latestRelease.browser_download_url
    } else {
      $false
    }
  register: install_winget_result
  changed_when: install_winget_result.stdout != 'False'
  args:
    executable: powershell.exe

- name: Install {{ winget_package }} using Winget Package Manager
  ansible.builtin.shell: |
    $needed = [bool](winget list {{ winget_package }})[-1].Contains('No installed package')
    If ($needed) {
      winget install -e --id {{ winget_package }}
      $stillNeeded = [bool](winget list {{ winget_package }})[-1].Contains('No installed package')
      If ($stillNeeded) {
        $Ansible.Failed = $true
      }
    } else {
      $false
    }
  args:
    executable: powershell.exe
  register: winget_install_result
  changed_when: winget_install_result.stdout != 'False'
  when: winget_package is defined
