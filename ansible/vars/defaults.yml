user: "weirdpattern"

dotfiles: "{{ ansible_user_dir }}/_/p/dotfiles"

git:
  user:
    name: "op://Private/github/name"
    email: "op://Private/github/email"
  ssh:
    signers: "op://Private/github/signers"
    configs:
      - name: "id_github"
        path: "op://Private/github ssh"

system:
  hosts: []

include_roles:
  - 1password
  - pwsh
  - zsh
  - starship
  - bat
  - ripgrep
  - fzf
  - eza
  - git
  - git-delta
  - tldr
  - neovim
  - vscode
  - wezterm
  # - ghostty
  # - devops
  # - github
  # - raycast
  # - ssh
  # - system
  # - tana

exclude_roles: []
